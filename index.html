<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高安全密码管理器</title>
    <style>
        :root { 
            --main-bg: #f8fafc; 
            --form-bg: #ffffff; 
            --text-dark: #0f172a; 
            --text-gray: #64748b; 
            --main-accent: #000000; 
            --input-border: #e2e8f0; 
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--main-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--text-dark); overflow: hidden; }
        .login-container { display: flex; width: 100%; height: 100%; max-width: 1100px; background-color: var(--form-bg); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        
        /* 左侧浅色动画区 */
        .animation-side { flex: 1; background-color: #f1f5f9; display: flex; justify-content: center; align-items: center; position: relative; border-right: 1px solid var(--input-border); }
        .animation-side .brand { position: absolute; top: 30px; left: 30px; font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 8px;}
        
        /* 【核心修改】：通过 CSS 将 SVG 整体向左移一點 */
        #character-animation {
            margin-left: -50px; /* 整体左移 50px */
            transform-origin: center center;
        }

        /* 【核心交互】：密码模式下，隐藏指定的白色巩膜 */
        .hide-on-pwd { transition: opacity 0.2s ease; }
        #character-animation.password-mode .hide-on-pwd { opacity: 0; }

        /* 右侧表单区 */
        .form-side { flex: 1; padding: 0 10%; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .welcome-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-gray); margin-bottom: 25px; font-size: 0.95rem; text-align: center; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: 0.2s; }
        .input-group input:focus { border-color: var(--main-accent); outline: none; box-shadow: 0 0 0 1px var(--main-accent); }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; background-color: var(--text-dark); color: white; margin-top: 10px; }
        .btn:hover { background-color: #334155; }
        
        .link-text { text-align: center; font-size: 0.9rem; color: var(--text-gray); margin-top: 20px; }
        .link-text a { color: var(--text-dark); text-decoration: none; font-weight: 600; cursor: pointer; margin: 0 5px; }
        .link-text a:hover { text-decoration: underline; }
        
        #message { margin-top: 15px; font-size: 14px; min-height: 20px; text-align: center; font-weight: 600; padding: 10px; border-radius: 6px; }
        
        .form-section { display: none; }
        .form-section.active { display: block; }
        
        @media (max-width: 900px) { .animation-side { display: none; } .form-side { padding: 40px; } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="animation-side">
        <div class="brand">🔒 C++ Core Auth</div>
        
        <svg id="character-animation" width="450" height="450" viewBox="0 0 100 100">
            <g id="char-purple">
                <rect x="30" y="30" width="22" height="45" rx="3" fill="#6d28d9"/>
                <circle class="eye-white hide-on-pwd" cx="36" cy="38" r="3" fill="white"/>
                <circle class="pupil" cx="36" cy="38" r="1.5" fill="black" data-base-cx="36" data-base-cy="38"/>
                <circle class="eye-white hide-on-pwd" cx="44" cy="38" r="3" fill="white"/>
                <circle class="pupil" cx="44" cy="38" r="1.5" fill="black" data-base-cx="44" data-base-cy="38"/>
            </g>
            
            <g id="char-dark">
                <rect x="65" y="45" width="12" height="30" rx="2" fill="#1e293b"/>
                <circle class="eye-white hide-on-pwd" cx="69" cy="51" r="2" fill="white"/>
                <circle class="pupil" cx="69" cy="51" r="1" fill="black" data-base-cx="69" data-base-cy="51"/>
                <circle class="eye-white hide-on-pwd" cx="74" cy="51" r="2" fill="white"/>
                <circle class="pupil" cx="74" cy="51" r="1" fill="black" data-base-cx="74" data-base-cy="51"/>
            </g>
            
            <g id="char-orange">
                <path d="M30 75 A20 20 0 0 1 70 75 L70 95 L30 95 Z" fill="#f97316"/>
                <circle class="pupil" cx="42" cy="78" r="1.5" fill="#431407" data-base-cx="42" data-base-cy="78"/>
                <circle class="pupil" cx="52" cy="78" r="1.5" fill="#431407" data-base-cx="52" data-base-cy="78"/>
            </g>
            
            <g id="char-yellow">
                <rect x="75" y="55" width="18" height="25" rx="6" fill="#facc15"/>
                <circle class="eye-white" cx="80" cy="63" r="2.5" fill="#facc15"/>
                <circle class="pupil" cx="80" cy="63" r="1.2" fill="#422006" data-base-cx="80" data-base-cy="63"/>
                <circle class="eye-white" cx="88" cy="63" r="2.5" fill="#facc15"/>
                <circle class="pupil" cx="88" cy="63" r="1.2" fill="#422006" data-base-cx="88" data-base-cy="63"/>
                <path d="M78 70 L90 70" stroke="#422006" stroke-width="1" stroke-linecap="round"/>
            </g>
        </svg>
    </div>
    
    <div class="form-side">
        <h2 class="welcome-title" id="main-title">System Login</h2>
        <p class="subtitle" id="sub-title">Secured by C++ PBKDF2 Engine</p>
        
        <div id="form-login" class="form-section active">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pwd" placeholder="••••••••">
            </div>
            <button class="btn" onclick="executeAPI('login')">Log in</button>
            <p class="link-text">
                <a onclick="switchMode('register')">Sign Up</a> | 
                <a onclick="switchMode('changepwd')">Change Password</a>
            </p>
        </div>

        <div id="form-register" class="form-section">
            <div class="input-group">
                <label>Choose Username</label>
                <input type="text" id="reg-user" placeholder="Enter new username">
            </div>
            <div class="input-group">
                <label>Set Password (Min 8 chars)</label>
                <input type="password" id="reg-pwd" placeholder="••••••••">
            </div>
            <button class="btn" style="background-color: #10b981;" onclick="executeAPI('register')">Register Account</button>
            <p class="link-text"><a onclick="switchMode('login')">Back to Login</a></p>
        </div>

        <div id="form-changepwd" class="form-section">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="chg-user" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Old Password</label>
                <input type="password" id="chg-oldpwd" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="chg-newpwd" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="chg-confirmpwd" placeholder="••••••••">
            </div>
            <button class="btn" style="background-color: #f59e0b;" onclick="executeAPI('changepwd')">Update Password</button>
            <p class="link-text"><a onclick="switchMode('login')">Back to Login</a></p>
        </div>
        
        <div id="message"></div>
    </div>
</div>

<script>
    // ==========================================
    // 1. 全局瞳孔追踪与视差身体跟随
    // ==========================================
    document.addEventListener('mousemove', (e) => {
        const svg = document.getElementById('character-animation');
        const svgRect = svg.getBoundingClientRect();
        
        // --- A. 精准瞳孔追踪 (Math.atan2) ---
        const pupils = document.querySelectorAll('.pupil');
        pupils.forEach(pupil => {
            const baseCx = parseFloat(pupil.getAttribute('data-base-cx'));
            const baseCy = parseFloat(pupil.getAttribute('data-base-cy'));
            
            const eyeCenterX = svgRect.left + (baseCx / 100) * svgRect.width;
            const eyeCenterY = svgRect.top + (baseCy / 100) * svgRect.height;
            
            const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
            // 限制 Pupil 移动范围
            const distance = Math.min(1.5, Math.hypot(e.clientX - eyeCenterX, e.clientY - eyeCenterY) / 50);
            
            pupil.setAttribute('cx', baseCx + Math.cos(angle) * distance);
            pupil.setAttribute('cy', baseCy + Math.sin(angle) * distance);
        });

        // --- B. 视差身体跟随 (微平移) ---
        // 计算鼠标相对画布中心的位置 [-0.5, 0.5]
        const normX = (e.clientX - svgRect.left) / svgRect.width - 0.5;
        const normY = (e.clientY - svgRect.top) / svgRect.height - 0.5;

        // 【核心修改】：降低身体移动系數，让移动更微妙 (原本的系數减半或更少)
        document.getElementById('char-purple').style.transform = `translate(${normX * 2}px, ${normY * 1}px)`;
        document.getElementById('char-dark').style.transform = `translate(${normX * 4}px, ${normY * 3}px)`; // 黑色降低系數
        document.getElementById('char-orange').style.transform = `translate(${normX * -1}px, ${normY * -0.5}px)`; // 橙色降低系數
        document.getElementById('char-yellow').style.transform = `translate(${normX * 2}px, ${normY * 2}px)`; // 黄色降低系數
    });

    // ==========================================
    // 2. 密码输入：白眼珠消失，黑眼珠保持追踪
    // ==========================================
    const svgAnim = document.getElementById('character-animation');
    const pwdInputs = document.querySelectorAll('input[type="password"]');

    pwdInputs.forEach(input => {
        input.addEventListener('focus', () => svgAnim.classList.add('password-mode'));
        input.addEventListener('blur', () => svgAnim.classList.remove('password-mode'));
    });

    // ==========================================
    // 3. 完美 UI 状态机切换
    // ==========================================
    function switchMode(mode) {
        document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
        document.getElementById(`form-${mode}`).classList.add('active');
        
        const title = document.getElementById('main-title');
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = "";
        msgDiv.style.backgroundColor = "transparent";

        if(mode === 'login') title.innerText = "System Login";
        if(mode === 'register') title.innerText = "Create Account";
        if(mode === 'changepwd') title.innerText = "Change Password";
        
        svgAnim.style.transform = "scale(1.03)";
        setTimeout(() => svgAnim.style.transform = "scale(1)", 150);
    }

    // ==========================================
    // 4. API 核心调用与数据一致性拦截
    // ==========================================
    function showError(msgDiv, msg) {
        msgDiv.style.backgroundColor = "#fee2e2";
        msgDiv.style.color = "#dc2626";
        msgDiv.innerText = msg;
    }

    async function executeAPI(action) {
        const msgDiv = document.getElementById('message');
        let endpoint = "", payload = {};

        if (action === 'login') {
            endpoint = "/api/login";
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pwd').value;
            if(!u || !p) return showError(msgDiv, "⚠️ Please fill in all fields.");
            payload = { username: u, password: p };

        } else if (action === 'register') {
            endpoint = "/api/register";
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pwd').value;
            if(!u || !p) return showError(msgDiv, "⚠️ Please fill in all fields.");
            payload = { username: u, password: p };

        } else if (action === 'changepwd') {
            endpoint = "/api/change_password";
            const u = document.getElementById('chg-user').value;
            const oldp = document.getElementById('chg-oldpwd').value;
            const newp = document.getElementById('chg-newpwd').value;
            const confp = document.getElementById('chg-confirmpwd').value;
            
            if(!u || !oldp || !newp || !confp) return showError(msgDiv, "⚠️ Please fill in all fields.");
            
            if (newp !== confp) {
                return showError(msgDiv, "❌ Passwords do not match!");
            }
            
            payload = { username: u, oldpw: oldp, newpw: newp };
        }

        msgDiv.style.backgroundColor = "#f1f5f9";
        msgDiv.style.color = "#64748b";
        msgDiv.innerText = "⏳ Accessing C++ Core Engine...";

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload) 
            });
            
            const result = await response.json();
            
            if (response.ok) {
                msgDiv.style.backgroundColor = "#d1fae5";
                msgDiv.style.color = "#059669";
                msgDiv.innerText = "✅ " + result.message;
                document.querySelectorAll('input').forEach(input => input.value = '');
            } else {
                showError(msgDiv, "❌ " + result.detail);
            }
        } catch (error) {
            showError(msgDiv, "❌ Server connection failed!");
        }
    }

    // ==========================================
    // 5. Enter 键全域监听
    // ==========================================
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            if (document.getElementById('form-login').classList.contains('active')) executeAPI('login');
            else if (document.getElementById('form-register').classList.contains('active')) executeAPI('register');
            else if (document.getElementById('form-changepwd').classList.contains('active')) executeAPI('changepwd');
        }
    });
</script>

</body>
</html>
